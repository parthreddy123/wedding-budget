<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P & E Wedding Budget</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rose: #e8c4c4;
            --rose-dark: #c9a0a0;
            --sage: #a8b5a2;
            --sage-dark: #8a9b83;
            --cream: #faf6f1;
            --gold: #c9a94e;
            --gold-light: #e8d99a;
            --charcoal: #3a3a3a;
            --white: #ffffff;
            --light-gray: #f0ede8;
            --mid-gray: #d4d0cb;
            --red: #c0392b;
            --green: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--rose) 0%, var(--sage) 100%);
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: var(--white);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            position: relative;
        }
        .header .subtitle {
            font-size: 1rem;
            color: var(--white);
            opacity: 0.9;
            margin-top: 0.3rem;
            font-style: italic;
            position: relative;
        }
        .sync-status {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            font-size: 0.75rem;
            font-family: -apple-system, sans-serif;
            color: var(--white);
            opacity: 0.8;
        }
        .sync-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 4px;
            vertical-align: middle;
        }
        .sync-dot.offline { background: var(--red); }

        /* Summary Bar */
        .summary-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding: 1.2rem 1rem;
            background: var(--white);
            border-bottom: 1px solid var(--mid-gray);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .summary-item {
            text-align: center;
        }
        .summary-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
        }
        .summary-item .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--charcoal);
        }
        .summary-item .value.over { color: var(--red); }
        .summary-item .value.under { color: var(--green); }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            flex-wrap: wrap;
            font-family: -apple-system, sans-serif;
        }
        .venue-tab {
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--mid-gray);
            border-radius: 25px;
            background: var(--white);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--charcoal);
        }
        .venue-tab.active {
            background: var(--charcoal);
            color: var(--white);
            border-color: var(--charcoal);
        }
        .venue-tab:hover:not(.active) {
            border-color: var(--gold);
        }

        /* Budget Table */
        .budget-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }
        .venue-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            margin: 1.5rem 0 1rem;
            color: var(--charcoal);
        }
        .venue-title .venue-total {
            font-size: 0.9rem;
            color: #888;
            display: block;
            margin-top: 0.2rem;
            font-family: -apple-system, sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        thead th {
            background: var(--charcoal);
            color: var(--white);
            padding: 0.75rem 0.6rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            text-align: right;
        }
        thead th:first-child { text-align: left; }
        thead th:last-child { text-align: left; }

        tbody td {
            padding: 0.6rem;
            border-bottom: 1px solid var(--light-gray);
            font-size: 0.9rem;
            text-align: right;
            vertical-align: middle;
        }
        tbody td:first-child {
            text-align: left;
            font-weight: 500;
            color: var(--charcoal);
        }
        tbody td:last-child { text-align: left; }

        tbody tr:hover { background: #fdfcfa; }
        tbody tr.total-row {
            background: var(--light-gray);
            font-weight: 700;
        }
        tbody tr.total-row td { border-bottom: none; }

        /* Editable cells */
        .editable {
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            min-width: 60px;
            display: inline-block;
            transition: background 0.15s;
        }
        .editable:hover { background: var(--gold-light); }
        .editable:focus {
            outline: 2px solid var(--gold);
            background: var(--white);
        }
        .editable.editing {
            background: var(--white);
            outline: 2px solid var(--gold);
        }

        .notes-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 0.8rem;
            color: #666;
            font-family: inherit;
            padding: 0.2rem;
            border-radius: 4px;
        }
        .notes-input:focus {
            outline: 2px solid var(--gold);
            background: var(--white);
        }

        /* Add row */
        .add-row-btn {
            display: block;
            margin: 0.8rem auto;
            padding: 0.5rem 1.5rem;
            border: 2px dashed var(--mid-gray);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 0.85rem;
            color: #999;
            transition: all 0.2s;
            font-family: -apple-system, sans-serif;
        }
        .add-row-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Delete button */
        .delete-btn {
            opacity: 0;
            cursor: pointer;
            color: var(--red);
            font-size: 0.8rem;
            padding: 0.2rem 0.4rem;
            border: none;
            background: none;
            transition: opacity 0.15s;
        }
        tbody tr:hover .delete-btn { opacity: 0.5; }
        .delete-btn:hover { opacity: 1 !important; }

        /* Decisions panel */
        .decisions-panel {
            max-width: 900px;
            margin: 0 auto 2rem;
            padding: 0 1rem;
        }
        .decisions-panel h3 {
            font-weight: 400;
            letter-spacing: 0.08em;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        .decision-card {
            background: var(--white);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.6rem;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            font-family: -apple-system, sans-serif;
        }
        .decision-check {
            width: 20px; height: 20px;
            border: 2px solid var(--mid-gray);
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }
        .decision-check.resolved {
            background: var(--sage);
            border-color: var(--sage);
        }
        .decision-text {
            flex: 1;
            font-size: 0.9rem;
            border: none;
            background: transparent;
            width: 100%;
            font-family: inherit;
            resize: none;
            color: var(--charcoal);
        }
        .decision-text:focus { outline: none; }
        .decision-delete {
            color: var(--red);
            cursor: pointer;
            opacity: 0.4;
            border: none;
            background: none;
            font-size: 0.9rem;
        }
        .decision-delete:hover { opacity: 1; }

        .add-decision-btn {
            display: block;
            margin: 0.5rem auto;
            padding: 0.4rem 1.2rem;
            border: 2px dashed var(--mid-gray);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 0.8rem;
            color: #999;
            font-family: -apple-system, sans-serif;
        }
        .add-decision-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.75rem;
            color: #aaa;
            font-family: -apple-system, sans-serif;
        }

        /* Notification toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--charcoal);
            color: var(--white);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: -apple-system, sans-serif;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .login-overlay.hidden { display: none; }
        .login-box {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .login-box h2 {
            font-weight: 400;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .login-box p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .login-box input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--mid-gray);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
            font-family: -apple-system, sans-serif;
        }
        .login-box input:focus {
            outline: 2px solid var(--gold);
            border-color: transparent;
        }
        .login-box button {
            width: 100%;
            padding: 0.7rem;
            background: var(--charcoal);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-family: -apple-system, sans-serif;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-error {
            color: var(--red);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6rem; }
            .summary-bar { gap: 0.8rem; }
            .summary-item .value { font-size: 1.1rem; }
            table { font-size: 0.8rem; }
            thead th, tbody td { padding: 0.5rem 0.4rem; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>P & E</h2>
        <p>Enter the password to access the wedding budget</p>
        <input type="password" id="passwordInput" placeholder="Password" autofocus>
        <button onclick="tryLogin()">Enter</button>
        <div class="login-error" id="loginError">Incorrect password</div>
    </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
    <header class="header">
        <div class="sync-status">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">Synced</span>
        </div>
        <h1>PARTH & EMILY</h1>
        <div class="subtitle">Wedding Budget</div>
    </header>

    <div class="summary-bar">
        <div class="summary-item">
            <div class="label">Total Budget</div>
            <div class="value" id="summaryTotal">-</div>
        </div>
        <div class="summary-item">
            <div class="label">Parth</div>
            <div class="value" id="summaryParth">-</div>
        </div>
        <div class="summary-item">
            <div class="label">Emily</div>
            <div class="value" id="summaryEmily">-</div>
        </div>
        <div class="summary-item">
            <div class="label">Other</div>
            <div class="value" id="summaryOther">-</div>
        </div>
    </div>

    <div class="controls">
        <button class="venue-tab active" data-venue="estate" onclick="switchVenue('estate')">Estate</button>
        <button class="venue-tab" data-venue="majestic" onclick="switchVenue('majestic')">Majestic</button>
        <button class="venue-tab" data-venue="glasshouse" onclick="switchVenue('glasshouse')">Glasshouse</button>
    </div>

    <div class="budget-section">
        <div class="venue-title">
            <span id="venueName">Estate</span>
            <span class="venue-total" id="venueTotal"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Parth</th>
                    <th>Emily</th>
                    <th>Other</th>
                    <th>Total</th>
                    <th>Notes / Decisions</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="budgetBody"></tbody>
        </table>
        <button class="add-row-btn" onclick="addRow()">+ Add Item</button>
    </div>

    <div class="decisions-panel">
        <h3>Decisions To Make</h3>
        <div id="decisionsList"></div>
        <button class="add-decision-btn" onclick="addDecision()">+ Add Decision</button>
    </div>

    <div class="footer">
        Changes sync in real-time between devices &middot; P&E 2026
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Supabase ───
const SUPABASE_URL = 'https://ddlfzwvnbawsnbeaultu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FVlxkuMjE7Mr98DVu9ktCg_o62Ml0Lt';
let sb = null;
try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
    console.warn('Supabase init failed, using local mode:', e);
}

// ─── State ───
let currentVenue = 'estate';
let budgetItems = [];
let decisions = [];
let useLocal = !sb;

// ─── Login ───
document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
});

function tryLogin() {
    const pw = document.getElementById('passwordInput').value;
    if (checkPassword(pw)) {
        localStorage.setItem('pe_budget_pw', pw);
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('app').style.display = 'block';
        init();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function checkPassword(pw) {
    return pw === 'pe2026';
}

// Auto-login if remembered
if (localStorage.getItem('pe_budget_pw') && checkPassword(localStorage.getItem('pe_budget_pw'))) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    setTimeout(init, 100);
}

// ─── Init ───
async function init() {
    await loadData();
    if (sb) subscribeToChanges();
}

async function loadData() {
    // Load budget items
    if (!sb) {
        budgetItems = getSeedData();
        decisions = getSeedDecisions();
        renderBudget(); renderDecisions(); updateSummary();
        showToast('Local mode — Supabase unavailable');
        return;
    }

    const { data: items, error: itemsErr } = await sb
        .from('wedding_budget')
        .select('*')
        .order('sort_order', { ascending: true });

    if (itemsErr) {
        console.error('Load error:', itemsErr);
        budgetItems = getSeedData();
        showToast('Using local data — check Supabase setup');
    } else if (!items || items.length === 0) {
        budgetItems = getSeedData();
        await seedDatabase();
    } else {
        budgetItems = items;
    }

    // Load decisions
    const { data: decs, error: decsErr } = await sb
        .from('wedding_decisions')
        .select('*')
        .order('created_at', { ascending: true });

    if (decsErr) {
        decisions = getSeedDecisions();
    } else if (!decs || decs.length === 0) {
        decisions = getSeedDecisions();
        await seedDecisions();
    } else {
        decisions = decs;
    }

    renderBudget();
    renderDecisions();
    updateSummary();
}

function getSeedData() {
    const venues = ['estate', 'majestic', 'glasshouse'];
    const rows = [
        { category: 'Main reception', parth: 0, emily: 0, other: 90000, notes: '' },
        { category: 'Indian wedding', parth: 0, emily: 0, other: 0, notes: '' },
        { category: 'Chinese wedding', parth: 0, emily: 0, other: 0, notes: '' },
        { category: 'Dinner + Travel', parth: 0, emily: 0, other: 4000, notes: '' },
        { category: 'Photographer/Videographer', parth: 0, emily: 0, other: 3000, notes: '' },
        { category: 'Clothing', parth: 4000, emily: 1500, other: 0, notes: '' },
        { category: 'Makeup, Hairstylist', parth: 0, emily: 1500, other: 0, notes: '' },
        { category: 'Planner', parth: 0, emily: 0, other: 0, notes: '' },
    ];
    const majesticOverrides = { 'Main reception': 65000, 'Indian wedding': 4500, 'Chinese wedding': 2000 };
    const glassOverrides = { 'Main reception': 65000, 'Indian wedding': 4500, 'Chinese wedding': 2000 };

    const items = [];
    let id = 1;
    for (const venue of venues) {
        rows.forEach((r, i) => {
            let other = r.other;
            if (venue === 'majestic' && majesticOverrides[r.category] !== undefined) other = majesticOverrides[r.category];
            if (venue === 'glasshouse' && glassOverrides[r.category] !== undefined) other = glassOverrides[r.category];
            items.push({
                id: id++,
                venue,
                category: r.category,
                parth_amount: r.parth,
                emily_amount: r.emily,
                other_amount: other,
                notes: r.notes,
                sort_order: i
            });
        });
    }
    return items;
}

function getSeedDecisions() {
    return [
        { id: crypto.randomUUID(), text: 'Estate — theatre seating or not?', resolved: false },
        { id: crypto.randomUUID(), text: 'Indian ceremony — do this in May or not, or in India? If so, when?', resolved: false },
        { id: crypto.randomUUID(), text: 'Can we move tea ceremony to reception same day on 9 May?', resolved: false },
    ];
}

async function seedDatabase() {
    const rows = budgetItems.map(({ id, ...rest }) => rest);
    const { error } = await sb.from('wedding_budget').insert(rows);
    if (error) console.error('Seed error:', error);
    else {
        const { data } = await sb.from('wedding_budget').select('*').order('sort_order');
        if (data) budgetItems = data;
    }
}

async function seedDecisions() {
    const { error } = await sb.from('wedding_decisions').insert(
        decisions.map(d => ({ text: d.text, resolved: d.resolved }))
    );
    if (error) console.error('Seed decisions error:', error);
    else {
        const { data } = await sb.from('wedding_decisions').select('*').order('created_at');
        if (data) decisions = data;
    }
}

// ─── Real-time ───
function subscribeToChanges() {
    sb.channel('budget-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wedding_budget' }, payload => {
            handleBudgetChange(payload);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'wedding_decisions' }, payload => {
            handleDecisionChange(payload);
        })
        .subscribe((status) => {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (status === 'SUBSCRIBED') {
                dot.classList.remove('offline');
                text.textContent = 'Live';
            } else {
                dot.classList.add('offline');
                text.textContent = 'Reconnecting...';
            }
        });
}

function handleBudgetChange(payload) {
    if (payload.eventType === 'INSERT') {
        budgetItems.push(payload.new);
    } else if (payload.eventType === 'UPDATE') {
        const idx = budgetItems.findIndex(i => i.id === payload.new.id);
        if (idx !== -1) budgetItems[idx] = payload.new;
    } else if (payload.eventType === 'DELETE') {
        budgetItems = budgetItems.filter(i => i.id !== payload.old.id);
    }
    renderBudget();
    updateSummary();
    showToast('Budget updated');
}

function handleDecisionChange(payload) {
    if (payload.eventType === 'INSERT') {
        decisions.push(payload.new);
    } else if (payload.eventType === 'UPDATE') {
        const idx = decisions.findIndex(d => d.id === payload.new.id);
        if (idx !== -1) decisions[idx] = payload.new;
    } else if (payload.eventType === 'DELETE') {
        decisions = decisions.filter(d => d.id !== payload.old.id);
    }
    renderDecisions();
}

// ─── Render Budget ───
function renderBudget() {
    const tbody = document.getElementById('budgetBody');
    const items = budgetItems.filter(i => i.venue === currentVenue);

    let totalParth = 0, totalEmily = 0, totalOther = 0;

    tbody.innerHTML = items.map(item => {
        const parth = item.parth_amount || 0;
        const emily = item.emily_amount || 0;
        const other = item.other_amount || 0;
        const total = parth + emily + other;
        totalParth += parth;
        totalEmily += emily;
        totalOther += other;

        return `<tr data-id="${item.id}">
            <td>
                <span class="editable" contenteditable="true"
                    onblur="updateField(${item.id}, 'category', this.textContent)">${item.category}</span>
            </td>
            <td>
                <span class="editable" contenteditable="true"
                    onblur="updateAmount(${item.id}, 'parth_amount', this.textContent)"
                    onfocus="editStart(this)">${formatNum(parth)}</span>
            </td>
            <td>
                <span class="editable" contenteditable="true"
                    onblur="updateAmount(${item.id}, 'emily_amount', this.textContent)"
                    onfocus="editStart(this)">${formatNum(emily)}</span>
            </td>
            <td>
                <span class="editable" contenteditable="true"
                    onblur="updateAmount(${item.id}, 'other_amount', this.textContent)"
                    onfocus="editStart(this)">${formatNum(other)}</span>
            </td>
            <td><strong>${formatCurrency(total)}</strong></td>
            <td>
                <input class="notes-input" value="${escapeHtml(item.notes || '')}"
                    onchange="updateField(${item.id}, 'notes', this.value)"
                    placeholder="Add note...">
            </td>
            <td><button class="delete-btn" onclick="deleteRow(${item.id})">✕</button></td>
        </tr>`;
    }).join('');

    // Total row
    const grandTotal = totalParth + totalEmily + totalOther;
    tbody.innerHTML += `<tr class="total-row">
        <td>Total</td>
        <td>${formatCurrency(totalParth)}</td>
        <td>${formatCurrency(totalEmily)}</td>
        <td>${formatCurrency(totalOther)}</td>
        <td><strong>${formatCurrency(grandTotal)}</strong></td>
        <td></td>
        <td></td>
    </tr>`;

    document.getElementById('venueTotal').textContent = formatCurrency(grandTotal);
}

// ─── Render Decisions ───
function renderDecisions() {
    const container = document.getElementById('decisionsList');
    container.innerHTML = decisions.map(d => `
        <div class="decision-card" data-id="${d.id}">
            <div class="decision-check ${d.resolved ? 'resolved' : ''}"
                onclick="toggleDecision('${d.id}')"></div>
            <textarea class="decision-text" rows="1"
                onchange="updateDecisionText('${d.id}', this.value)"
                style="${d.resolved ? 'text-decoration:line-through;opacity:0.5' : ''}"
            >${escapeHtml(d.text)}</textarea>
            <button class="decision-delete" onclick="deleteDecision('${d.id}')">✕</button>
        </div>
    `).join('');
}

// ─── Summary ───
function updateSummary() {
    const items = budgetItems.filter(i => i.venue === currentVenue);
    let parth = 0, emily = 0, other = 0;
    items.forEach(i => {
        parth += i.parth_amount || 0;
        emily += i.emily_amount || 0;
        other += i.other_amount || 0;
    });
    const total = parth + emily + other;
    document.getElementById('summaryTotal').textContent = formatCurrency(total);
    document.getElementById('summaryParth').textContent = formatCurrency(parth);
    document.getElementById('summaryEmily').textContent = formatCurrency(emily);
    document.getElementById('summaryOther').textContent = formatCurrency(other);
}

// ─── Actions ───
function switchVenue(venue) {
    currentVenue = venue;
    document.querySelectorAll('.venue-tab').forEach(t => t.classList.toggle('active', t.dataset.venue === venue));
    document.getElementById('venueName').textContent = venue.charAt(0).toUpperCase() + venue.slice(1);
    renderBudget();
    updateSummary();
}

function editStart(el) {
    const text = el.textContent;
    if (text === '0' || text === '-') el.textContent = '';
    el.classList.add('editing');
}

async function updateAmount(id, field, value) {
    const num = parseFloat(value.replace(/[^0-9.-]/g, '')) || 0;
    const item = budgetItems.find(i => i.id === id);
    if (item) item[field] = num;
    renderBudget();
    updateSummary();

    if (sb) {
        const { error } = await sb.from('wedding_budget').update({ [field]: num }).eq('id', id);
        if (error) showToast('Save failed — check connection');
    }
}

async function updateField(id, field, value) {
    const item = budgetItems.find(i => i.id === id);
    if (item) item[field] = value;

    if (sb) {
        const { error } = await sb.from('wedding_budget').update({ [field]: value }).eq('id', id);
        if (error) showToast('Save failed');
    }
}

async function addRow() {
    const items = budgetItems.filter(i => i.venue === currentVenue);
    const newItem = {
        venue: currentVenue,
        category: 'New Item',
        parth_amount: 0,
        emily_amount: 0,
        other_amount: 0,
        notes: '',
        sort_order: items.length
    };

    if (sb) {
        const { data, error } = await sb.from('wedding_budget').insert(newItem).select();
        if (error) { showToast('Could not add row'); return; }
        if (data) budgetItems.push(data[0]);
    } else {
        newItem.id = Date.now();
        budgetItems.push(newItem);
    }
    renderBudget();
    updateSummary();
}

async function deleteRow(id) {
    if (!confirm('Delete this item?')) return;
    budgetItems = budgetItems.filter(i => i.id !== id);
    renderBudget();
    updateSummary();
    if (sb) await sb.from('wedding_budget').delete().eq('id', id);
}

async function addDecision() {
    const newDec = { text: 'New decision...', resolved: false };
    if (sb) {
        const { data, error } = await sb.from('wedding_decisions').insert(newDec).select();
        if (error) { showToast('Could not add decision'); return; }
        if (data) decisions.push(data[0]);
    } else {
        newDec.id = crypto.randomUUID();
        decisions.push(newDec);
    }
    renderDecisions();
}

async function toggleDecision(id) {
    const dec = decisions.find(d => d.id === id);
    if (!dec) return;
    dec.resolved = !dec.resolved;
    renderDecisions();
    if (sb) await sb.from('wedding_decisions').update({ resolved: dec.resolved }).eq('id', id);
}

async function updateDecisionText(id, text) {
    const dec = decisions.find(d => d.id === id);
    if (dec) dec.text = text;
    if (sb) await sb.from('wedding_decisions').update({ text }).eq('id', id);
}

async function deleteDecision(id) {
    decisions = decisions.filter(d => d.id !== id);
    renderDecisions();
    if (sb) await sb.from('wedding_decisions').delete().eq('id', id);
}

// ─── Helpers ───
function formatCurrency(n) {
    return new Intl.NumberFormat('en-MY', { style: 'currency', currency: 'MYR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
}
function formatNum(n) {
    return n === 0 ? '-' : n.toLocaleString();
}
function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
